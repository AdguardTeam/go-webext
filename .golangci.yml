version: "2"
run:
  concurrency: 4
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        # G117 flags exported struct fields whose names match secret patterns
        # (e.g. ClientSecret, RefreshToken). These are configuration structs
        # populated from environment variables and need exported fields.
        - G117
        # G704 flags SSRF via taint analysis on client.Do(req) calls.
        # URLs are built from env vars and manifest.json, not untrusted input.
        - G704
    gocyclo:
      min-complexity: 20
    lll:
      line-length: 200
  exclusions:
    generated: lax
    rules:
      - path: (.+)\.go$
        text: error return value not checked \(defer .*\.Close()\)
      - path: (.+)\.go$
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
    paths:
      - .*generated.*
      - .*_test.go
      - tmp
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - .*generated.*
      - .*_test.go
      - tmp
      - third_party$
      - builtin$
      - examples$
