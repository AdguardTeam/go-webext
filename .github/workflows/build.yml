name: Build

description: >-
  Lints, tests, and verifies the package builds on pull requests and pushes
  to master. The binary is not published; it is only compiled here to catch
  build breaks early.

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: Test
    runs-on: team-extensions
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run tests via Docker
        run: DOCKER_BUILDKIT=1 docker build --progress plain --target test-output .

  lint:
    name: Lint
    runs-on: team-extensions
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run linters via Docker
        run: DOCKER_BUILDKIT=1 docker build --progress plain --target lint-output .

  build:
    name: Build
    runs-on: team-extensions
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify package builds via Docker
        run: DOCKER_BUILDKIT=1 docker build --progress plain --target build-output .
