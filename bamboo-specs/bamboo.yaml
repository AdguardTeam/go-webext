---
version: 2
plan:
  project-key: ADGEXT
  key: GOWEBEXT
  name: gowebext

stages:
  - Test:
      manual: false
      final: false
      jobs:
        - Test

  - Lint:
      manual: false
      final: false
      jobs:
        - Lint

Test:
  key: TEST
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            docker build \
              --file Dockerfile \
              --progress plain \
              --target test-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - ./bamboo-specs/scripts/cleanup.sh ""
  requirements: &requirements
    - extension: 'true'

Lint:
  key: LINT
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            docker build \
              --file Dockerfile \
              --progress plain \
              --target lint-output \
              --output type=local,dest=output \
              .
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - ./bamboo-specs/scripts/cleanup.sh ""
  requirements: *requirements

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: 'true'

notifications: [ ]
labels: [ ]
other:
  concurrent-build-plugin: system-default
